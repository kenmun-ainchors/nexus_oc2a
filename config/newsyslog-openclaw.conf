# newsyslog-openclaw.conf
# CHG-0941 — OpenClaw gateway LaunchAgent lifecycle hardening
# User-level newsyslog config for OpenClaw gateway logs.
#
# Install (system-wide; requires sudo to place in /etc/newsyslog.d/):
#   sudo cp ~/.openclaw/workspace/config/newsyslog-openclaw.conf /etc/newsyslog.d/openclaw.conf
#   sudo newsyslog -v
#
# This is a SAMPLE / REFERENCE config. The actual rotation runs via
# ~/.openclaw/workspace/scripts/gateway-logrotate.sh from the watchdog cron
# so we do NOT require sudo. Both share the same retention policy.
#
# Fields: logfilename owner group mode count size when flags [/pid_file] [sig]
# - count: rotated generations to keep
# - size:  rotate when log reaches this size in KB
# - when:  rotation time spec (optional if size is set)
# - flags: B = compress with bzip2; J = compress with xz/bzip2-lzma; Z = gzip
#          N = no warn when file doesn't exist; G = rotate even if file doesn't exist
# - pid_file + sig: send signal to process so it reopens the log (e.g. HUP for syslog)

# logfile                                   owner             group   mode    count   size    when    flags
/Users/ainchorsoc2a/Library/Logs/openclaw/gateway.log    ainchorsoc2a        staff   600     5       10240   *       GJN
/Users/ainchorsoc2a/Library/Logs/openclaw/gateway.err.log ainchorsoc2a        staff   600     5       10240   *       GJN
/Users/ainchorsoc2a/.openclaw/logs/gateway-watchdog.log  ainchorsoc2a        staff   600     3       2048    *       GJN
