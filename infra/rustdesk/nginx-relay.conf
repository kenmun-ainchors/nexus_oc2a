worker_processes 1;
worker_rlimit_nofile 4096;
error_log /Users/ainchorsangiefpl/.openclaw/workspace/infra/rustdesk/nginx-relay.log warn;
pid /Users/ainchorsangiefpl/.openclaw/workspace/infra/rustdesk/nginx-relay.pid;

events {
    worker_connections 1024;
}

stream {
    tcp_nodelay off;

    # RustDesk ports
    server { listen 100.91.60.36:21114; proxy_pass 127.0.0.1:21114; proxy_connect_timeout 5s; proxy_timeout 600s; }
    server { listen 100.91.60.36:21115; proxy_pass 127.0.0.1:21115; proxy_connect_timeout 5s; proxy_timeout 600s; }
    server { listen 100.91.60.36:21116; proxy_pass 127.0.0.1:21116; proxy_connect_timeout 5s; proxy_timeout 600s; }
    server { listen 100.91.60.36:21117; proxy_pass 127.0.0.1:21117; proxy_connect_timeout 5s; proxy_timeout 600s; }
    server { listen 100.91.60.36:21116 udp; proxy_pass 127.0.0.1:21116; proxy_timeout 30s; }

    # macOS Screen Sharing (VNC) — screensharingd only binds loopback on Tahoe
    server {
        listen 100.91.60.36:5900;
        proxy_pass 127.0.0.1:5900;
        proxy_connect_timeout 5s;
        proxy_timeout 3600s;
    }
}
