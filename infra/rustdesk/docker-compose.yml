# RustDesk Self-Hosted Server — OC1 (AInchors)
# TKT-0120 | LAN: 192.168.3.3 | Tailscale: 100.91.60.36
# Websocket ports (21118/21119) omitted — desktop clients only, not needed

services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    command: hbbs
    volumes:
      - ./data:/root
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
    restart: unless-stopped
    depends_on:
      - hbbr
    networks:
      - rustdesk

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    command: hbbr
    volumes:
      - ./data:/root
    ports:
      - "21117:21117"
    restart: unless-stopped
    networks:
      - rustdesk

networks:
  rustdesk:
    driver: bridge
