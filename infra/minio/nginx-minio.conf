worker_processes 1;
error_log /Users/ainchorsangiefpl/.openclaw/workspace/infra/minio/nginx-minio.log warn;
pid /Users/ainchorsangiefpl/.openclaw/workspace/infra/minio/nginx-minio.pid;

events { worker_connections 256; }

http {
    client_max_body_size 1024m;

    server {
        listen 100.91.60.36:9000;
        server_name ainchorss-mac-mini.tail5e2567.ts.net;

        location / {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
